name: deploy

# Publishes the built PWA to GitHub Pages. Pages serves it at the custom domain
# in public/CNAME (chat.phantomyard.ai) and auto-provisions the Let's Encrypt
# certificate once DNS resolves — no Terraform/ACM, the same pattern as
# phantombot.bot.
#
# TEMPORARY (dogfood, 2026-06-14): deploys on a push to ANY branch, not just
# main, so every commit on an open PR ships to the single live Pages target and
# Andrew's test clients auto-update (APP_VERSION = 1.0.<run_number> bumps every
# run → new service worker → clients refresh on reload). No real users yet — the
# phantombot repo isn't merged. REVERT to `branches: [main]` once phantomchat is
# stable enough to call production.
on:
  push:
    branches: ['**']
  workflow_dispatch:

# Least-privilege: Pages deploys need pages:write + id-token:write for the
# OIDC handshake that actions/deploy-pages performs. contents:read is enough
# to check out and build.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight production deploy; queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `generate-changelog` (part of `pnpm run build`)
          # can read tags/commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Versioning scheme: 1.0.<build_number>. github.run_number is the monotonic
      # per-workflow build counter (never regresses), matching phantombot's
      # 1.0.<build_number> tags. Vite bakes APP_VERSION into the bundle and emits
      # dist/version + dist/version.json.
      - run: pnpm run build
        env:
          APP_VERSION: 1.0.${{ github.run_number }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Tag the released build v1.0.<build_number> after a successful deploy, mirroring
  # phantombot's release-tagging. Scoped contents:write only on this job.
  tag:
    needs: deploy
    # Only cut release tags from main — dogfood commits on feature branches
    # still deploy + bump the in-bundle version, they just don't litter tags.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create and push version tag
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          git tag "$VERSION"
          git push origin "$VERSION"
