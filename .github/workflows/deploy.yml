name: deploy

# Publishes the built PWA to GitHub Pages. Pages serves it at the custom domain
# in public/CNAME (chat.phantomyard.ai) and auto-provisions the Let's Encrypt
# certificate once DNS resolves — no Terraform/ACM, the same pattern as
# phantombot.bot.
#
# Deploy policy (2026-06-27): auto-deploy ONLY on merge to main. PR branches run
# tests/checks (ci.yml) but never auto-ship to the live Pages target. To deploy a
# feature branch on demand, use the manual "Run workflow" button (workflow_dispatch)
# in the Actions tab and pick the branch — gated by repo write access, so only
# collaborators (Andrew, Robbie, Kai, Lena) can trigger it. APP_VERSION =
# 1.0.<run_number> still bumps each run → new service worker → clients refresh.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: Pages deploys need pages:write + id-token:write for the
# OIDC handshake that actions/deploy-pages performs. contents:read is enough
# to check out and build.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight production deploy; queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so `generate-changelog` (part of `pnpm run build`)
          # can read tags/commits.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Versioning scheme: 1.0.<build_number>. github.run_number is the monotonic
      # per-workflow build counter (never regresses), matching phantombot's
      # 1.0.<build_number> tags. Vite bakes APP_VERSION into the bundle and emits
      # dist/version + dist/version.json.
      - run: pnpm run build
        env:
          APP_VERSION: 1.0.${{ github.run_number }}
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # Tag the released build v1.0.<build_number> after a successful deploy, mirroring
  # phantombot's release-tagging. Scoped contents:write only on this job.
  tag:
    needs: deploy
    # Tag every released build so the live version always maps back to a commit:
    #   - auto-deploys from main (push), and
    #   - on-demand feature-branch deploys via the manual "Run workflow" button
    #     (workflow_dispatch) — these ship live without merging, so they MUST be
    #     tagged too, otherwise the deployed 1.0.<run_number> bundle has no commit
    #     marker. The tag is annotated with the source ref for provenance.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Default checkout ref is the dispatched/pushed branch, so the tag lands on
      # exactly the commit that was built and deployed above.
      - uses: actions/checkout@v5
      - name: Create and push version tag
        run: |
          # Annotated tags need a committer identity; the runner has none by
          # default (fatal: empty ident name → exit 128). Use the github-actions
          # bot identity so the tag is attributable to the workflow.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION="v1.0.${{ github.run_number }}"
          git tag -a "$VERSION" -m "Release $VERSION from ${{ github.ref_name }} (${{ github.sha }})"
          git push origin "$VERSION"
